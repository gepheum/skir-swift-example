name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check Skir code formatting
        run: npx skir format --ci

      - name: Run Skir-to-Swift codegen
        run: npx skir gen

      - name: Build
        run: swift build

      - name: Run snippets
        run: swift run Snippets
